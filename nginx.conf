
server {
    listen 1026;
    server_name broker.opsilab.it;


   
    location / {
        add_header Cache-Control "public, max-age=31536000";
        root /usr/share/nginx/html; 
        try_files $uri $uri/ /index.html;

        # Remove the X-Frame-Options header
        proxy_hide_header X-Frame-Options;



        # Altri header CORS se necessari
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Link,Authorization' always;


 
    }

}

