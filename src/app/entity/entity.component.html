
<div class="card">

  <p-table #dt [value]="entitys" [rows]="6" [paginator]="true" [globalFilterFields]="['id','type']"
    [rowHover]="true" dataKey="id"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [showCurrentPageReport]="true">
    <ng-template pTemplate="caption">
        <div class="p-d-flex p-ai-center p-jc-between">
            <!-- Pulsante "New" a sinistra -->
            <button pButton pRipple label="New" icon="pi pi-plus" class="p-mr-2 p-d-inline-block" (click)="openNew()" *ngIf="isAmministrative ===true"></button>
    
            <!-- Barra di ricerca a destra -->
            <span class="p-input-icon-left">
                <i class="pi pi-search"></i>
                <input pInputText entity="text" (input)="dt.filterGlobal($event.target.value, 'contains')" placeholder="Search..." />
            </span>
        </div>
    </ng-template>
    
      <ng-template pTemplate="header">
          <tr>
              <th pSortableColumn="id">Entity <p-sortIcon field="id"></p-sortIcon></th>
              <th pSortableColumn="type">Type <p-sortIcon field="type"></p-sortIcon></th>
              <th class="action-container">Actions</th>
            </tr>
      </ng-template>
      
      <ng-template pTemplate="body" let-entity>
          <tr>
              <td>{{ entity.id }}</td>
              <td>{{ entity.type }}</td>
          
              <td class="action-container">
                <button pButton pRipple icon="pi pi-eye" (click)="viewEntity(entity)" class="p-button-rounded p-button-success p-mr-2 action-button"></button>
                <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-danger p-mr-2 action-button" (click)="deleteEntity(entity.id)" *ngIf="isAmministrative ===true"></button>          

              </td>   
        </tr>
      </ng-template>
  </p-table>

</div>
<p-dialog [(visible)]="entityDialogNew" [style]="{width: '450px'}" header="Insert Entity" [modal]="true" styleClass="p-fluid">
    <div class="p-field">
        <label for="name">Entity</label>
        <input entity="text" pInputText id="entity" [(ngModel)]="entity"/>
    </div>

    <div class="p-field">
        <label for="name">Type</label>
        <p-dropdown [options]="types" [(ngModel)]="type" optionLabel="type" placeholder="Select a Type" [filter]="true" appendTo="body"></p-dropdown>
    </div>
 

  <p-footer>
    <button pButton pRipple label="Save" icon="pi pi-check" class="p-button-text" (click)="saveNewEntity()"></button>
    <button pButton pRipple label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>

  </p-footer>
</p-dialog>

<p-dialog header="Confirmation" [(visible)]="display" [modal]="true" [style]="{width: '50vw'}" [baseZIndex]="10000" [closable]="false">
  <p>Are you sure you want to delete the entity with ID: <strong>{{entityId}}</strong>?</p>
  <p-footer>
      <button type="button" pButton icon="pi pi-check" label="Delete" (click)="deleteEntityConfirm(entityId); display=false;" class="p-button-danger p-mr-2"></button>
      <button type="button" pButton icon="pi pi-times" label="Cancel" (click)="display=false;" class="p-button-secondary"></button>
  </p-footer>
</p-dialog>


<p-dialog header="Entity Details" [(visible)]="view" [modal]="true" [style]="{width: '50vw'}" [baseZIndex]="10000" [closable]="false">
  <pre>
    <button type="button" (click)="toggleTimestamps()">{{ showTimestamps ? '-' : '+' }}</button> {{ '{' }}
    <span [innerHTML]="entityDetailsString"></span>
  </pre>
  <p-footer>
    <button type="button" pButton icon="pi pi-times" label="Close" (click)="view=false;" class="p-button-secondary"></button>
  </p-footer>
</p-dialog>
