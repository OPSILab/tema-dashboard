
<div class="card" >
    
  <p-table #dt [value]="sottoscrizioni" [rows]="6" [paginator]="true" [globalFilterFields]="['id','types','endpoint']"
      [(selection)]="selectedSottoscrizioni" [rowHover]="true" dataKey="id"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [showCurrentPageReport]="true">
      
      <ng-template pTemplate="caption">
        <div class="p-d-flex p-ai-center p-jc-between">
            <!-- Pulsante "New" a sinistra -->
            <button pButton pRipple label="New" icon="pi pi-plus" class="p-mr-2 p-d-inline-block" (click)="openNew()" *ngIf="isAmministrative ===true"></button>
    
            <!-- Barra di ricerca a destra -->
            <span class="p-input-icon-left">
                <i class="pi pi-search"></i>
                <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')" placeholder="Search..." />
            </span>
        </div>
    </ng-template>

      
      <ng-template pTemplate="header">
          <tr>
              <th pSortableColumn="types" style="width: 30%;">Types <p-sortIcon field="types"></p-sortIcon></th>
              <th pSortableColumn="endpoint">Endpoint <p-sortIcon field="endpoint"></p-sortIcon></th>
              <th pSortableColumn="header">Header <p-sortIcon field="header"></p-sortIcon></th>
              <th >Actions</th>
          </tr>
      </ng-template>
      
      <ng-template pTemplate="body" let-sottoscrizione>
      <tr>
          <td >{{formatTypes(sottoscrizione.types)}}</td>
          <td>{{sottoscrizione.endpoint}}</td>
          <td>{{sottoscrizione.header}}</td>
          <td class="action-container">
            <button pButton pRipple icon="pi pi-eye" (click)="viewSottoscrizione(sottoscrizione)" class="p-button-rounded p-button-success p-mr-2 action-button"></button>
            <button pButton pRipple icon="pi pi-pencil" class="p-button-rounded p-button-success p-mr-2 action-button" (click)="editSottoscrizione(sottoscrizione)" *ngIf="isAmministrative ===true"></button>
            <button pButton pRipple icon="pi pi-trash" class="p-button-rounded p-button-danger p-mr-2 action-button" (click)="deleteSottoscrizione(sottoscrizione)" *ngIf="isAmministrative ===true"></button>          
            <button pButton pRipple icon="pi pi-play" class="p-button-rounded p-button-warning p-mr-2 action-button" 
            (click)="toggleSubscriptionStatus(sottoscrizione)" 
            *ngIf="sottoscrizione.status === 'paused' && isAmministrative === true"></button>
    <button pButton pRipple icon="pi pi-pause" class="p-button-rounded p-button-success p-mr-2 action-button" 
            (click)="toggleSubscriptionStatus(sottoscrizione)" 
            *ngIf="sottoscrizione.status === 'active' && isAmministrative === true"></button>
        </td>
      </tr>
  </ng-template>
</p-table>
</div>

<p-dialog [(visible)]="sottoscrizioneDialog" [style]="{width: '550px'}" header="Update Subscription" [modal]="true" styleClass="p-fluid">
  <div class="p-field">
      <label for="types">Types</label>
      <textarea pInputTextarea id="types" rows="2" [value]="formatTypesString(sottoscrizione.types)" disabled></textarea>  </div>
  <div class="p-field">
      <label for="endpoint">Endpoint <span style="color: red;">*</span></label>
      <input type="text" pInputText id="endpoint" [(ngModel)]="sottoscrizione.endpoint" />
  </div>
  <div class="p-field">
      <label for="header">Header <small style="font-size: 0.7em; color: #000000;">(Optional)</small> 
          <i pTooltip="Enter the header in the format: 
              [{ 'key': 'Your Key', 
                  'value': 'Your Value' 
              }]" tooltipPosition="top" class="pi pi-question-circle" style="margin-left: .5em; color: #007ad9; cursor: pointer;"></i>
      </label>
      <textarea pInputTextarea id="header" rows="6" [(ngModel)]="sottoscrizione.header" disabled ></textarea>
  </div>
  <p-footer>
      <button pButton pRipple label="Save" icon="pi pi-check" class="p-button-text" (click)="saveSubscription()"></button>
      <button pButton pRipple label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>
  </p-footer>
</p-dialog>

<p-dialog [(visible)]="sottoscriviDialogNew" [style]="{width: '450px'}" header="Subscribe Types" [modal]="true" styleClass="p-fluid">  
    <div class="p-field">
        <label for="name">Type</label>
        <p-multiSelect 
        [options]="typesOptions" 
        [(ngModel)]="type" 
        defaultLabel="Select Types" 
        display="chip" 
        styleClass="w-full md:w-20" 
        [filter]="true" 
        appendTo="body">
    </p-multiSelect>       
    </div>
    <div class="p-field">
        <label for="description">Endpoint <span style="color: red;">*</span></label>
        <input type="text" pInputText id="endpoint" [(ngModel)]="endpoint" />
    </div>
    <div class="p-field">
        <label for="header">Header <small style="font-size: 0.7em; color: #000000;">(Optional)</small> <i pTooltip="Enter the header in the format: 
            [{ 'key': 'Your Key', 
                'value': 'Your Value' 
              }]" tooltipPosition="top" class="pi pi-question-circle" style="margin-left: .5em; color: #007ad9; cursor: pointer;"></i></label>
        <textarea pInputTextarea id="header" rows="6" [(ngModel)]="header"></textarea>
    </div>
  <p-footer>
    <button pButton pRipple label="Save" icon="pi pi-check" class="p-button-text" (click)="saveNewSottoscrizione()"></button>
    <button pButton pRipple label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>

  </p-footer>
</p-dialog>

<p-dialog header="Confirmation" [(visible)]="display" [modal]="true" [style]="{width: '50vw'}" [baseZIndex]="10000" [closable]="false">
  <p>Are you sure you want to delete the subscription with ID: <strong>{{subscriptionID}}</strong>?</p>
  <p-footer>
      <button type="button" pButton icon="pi pi-check" label="Delete" (click)="deleteSottoscrizioneConfirm(); display=false;" class="p-button-danger p-mr-2"></button>
      <button type="button" pButton icon="pi pi-times" label="Cancel" (click)="display=false;" class="p-button-secondary"></button>
  </p-footer>
</p-dialog>

<p-dialog header="Subscription Details" [(visible)]="view" [modal]="true" [style]="{width: '50vw'}" [baseZIndex]="10000" [closable]="false">
  <pre>{{subscriptionDetails}}</pre>
  <p-footer>
      <button type="button" pButton icon="pi pi-times" label="Close" (click)="view=false;" class="p-button-secondary"></button>
  </p-footer>
</p-dialog>
