
<div class="card">

  <p-table #dt [value]="types" [rows]="6" [paginator]="true" [globalFilterFields]="['type']"
      [(selection)]="selectedTypes" [rowHover]="true" dataKey="id"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [showCurrentPageReport]="true">

      <ng-template pTemplate="caption">
        <div class="p-d-flex p-ai-center p-jc-between">
            <!-- Pulsante "New" a sinistra -->
            <button pButton pRipple label="New" icon="pi pi-plus" class="p-mr-2 p-d-inline-block" (click)="openNew()" *ngIf="isAmministrative ===true"></button>
    
            <!-- Barra di ricerca a destra -->
            <span class="p-input-icon-left">
                <i class="pi pi-search"></i>
                <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')" placeholder="Search..." />
            </span>
        </div>
    </ng-template>
    
      <ng-template pTemplate="header">
          <tr>
              <th pSortableColumn="type">Type <p-sortIcon field="type"></p-sortIcon></th>
              <th class="action-container">Subscribe</th>
          </tr>
      </ng-template>
      
      <ng-template pTemplate="body" let-type>
          <tr>
              <td>{{ type.type }}</td>
              <td class="action-container">
                  <button pButton pRipple icon="pi pi-bell" class="p-button-rounded p-button-success p-mr-2 action-button" (click)="editSottoscrizione(type.type)" *ngIf="isAmministrative ===true"></button>
              </td>
          </tr>
      </ng-template>
  </p-table>

</div>
<p-dialog [(visible)]="typeDialog" [style]="{width: '450px'}" header="Subscribe Types" [modal]="true" styleClass="p-fluid">
    <div class="p-field">
        <label for="name">Type</label>
        <input type="text" pInputText id="type" [(ngModel)]="type" readonly/>
    </div>
    <div class="p-field">
        <label for="description">Endpoint <span style="color: red;">*</span></label>
        <input type="text" pInputText id="endpoint" [(ngModel)]="endpoint" />
    </div>
    <div class="p-field">
        <label for="header">Header <small style="font-size: 0.7em; color: #000000;">(Optional)</small> <i pTooltip="Enter the header in the format: 
            [{ 'key': 'Your Key', 
                'value': 'Your Value' 
              }]" tooltipPosition="top" class="pi pi-question-circle" style="margin-left: .5em; color: #007ad9; cursor: pointer;"></i></label>


        <textarea pInputTextarea id="header" rows="6" [(ngModel)]="header"></textarea>
    </div>


  <p-footer>
    <button pButton pRipple label="Save" icon="pi pi-check" class="p-button-text" (click)="createSubscription()"></button>
    <button pButton pRipple label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>

  </p-footer>
</p-dialog>
<p-dialog [(visible)]="typeDialogNew" [style]="{width: '450px'}" header="Insert Types" [modal]="true" styleClass="p-fluid">
    <div class="p-field">
        <label for="name">Type</label>
        <input type="text" pInputText id="type" [(ngModel)]="type"/>
    </div>
  <p-footer>
    <button pButton pRipple label="Save" icon="pi pi-check" class="p-button-text" (click)="saveNewEntity()"></button>
    <button pButton pRipple label="Cancel" icon="pi pi-times" class="p-button-text" (click)="hideDialog()"></button>

  </p-footer>
</p-dialog>
